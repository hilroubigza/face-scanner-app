<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กล้องสแกนใบหน้า</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #1e293b;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #videoElement {
            width: 100%;
            max-width: 500px;
            border: 4px solid #3b82f6;
            border-radius: 12px;
            background-color: #0f172a;
            transform: scaleX(-1); /* สลับซ้ายขวาให้เหมือนกระจก */
        }
        .status {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            background-color: #334155;
            font-size: 1.2rem;
        }
        
        /* ปุ่มจำลองสำหรับทดสอบ (ลบออกได้ตอนเชื่อม AI จริง) */
        .test-controls {
            margin-top: 20px;
            padding: 15px;
            background: #475569;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
        }
        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <h2>ระบบสแกนใบหน้า</h2>
    <video id="videoElement" autoplay muted playsinline></video>
    
    <div id="statusMessage" class="status">กำลังเปิดกล้อง...</div>

    <div class="test-controls">
        <p>🛠️ โซนทดสอบระบบ (Simulator)</p>
        <input type="text" id="testStudentId" placeholder="กรอกรหัสนักเรียนเพื่อทดสอบ">
        <button onclick="simulateMatch()">จำลองการสแกนเจอ</button>
    </div>

    <script>
        // 1. เปิดกล้อง
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                document.getElementById('videoElement').srcObject = stream;
                document.getElementById('statusMessage').innerText = 'กล้องพร้อมทำงาน รอสแกน...';
                document.getElementById('statusMessage').style.backgroundColor = '#15803d'; // สีเขียว
            } catch (err) {
                document.getElementById('statusMessage').innerText = 'ไม่สามารถเข้าถึงกล้องได้: ' + err.message;
                document.getElementById('statusMessage').style.backgroundColor = '#b91c1c'; // สีแดง
            }
        }

        // 2. ฟังก์ชันส่งข้อมูลกลับไปยังระบบหลัก (GAS Webapp)
        function sendMatchResultToParent(studentId) {
            // เช็คว่าถูกเปิดมาจากหน้าต่างอื่น (window.open) หรือไม่
            if (window.opener && !window.opener.closed) {
                // ส่ง Data กลับไปหาหน้าต่างหลัก
                window.opener.postMessage({
                    action: 'faceMatched',
                    studentId: studentId
                }, '*'); // ในการใช้งานจริง เปลี่ยน '*' เป็น URL ของ GAS webapp ของคุณเพื่อความปลอดภัย

                document.getElementById('statusMessage').innerText = `สแกนสำเร็จ: รหัส ${studentId}`;
                document.getElementById('statusMessage').style.backgroundColor = '#0369a1';
                
                setTimeout(() => {
                    document.getElementById('statusMessage').innerText = 'กล้องพร้อมทำงาน รอสแกน...';
                    document.getElementById('statusMessage').style.backgroundColor = '#15803d';
                }, 2000);
            } else {
                alert('ไม่พบหน้าต่างระบบหลัก (กรุณาเปิดจากปุ่มในหน้าระบบเช็คชื่อ)');
            }
        }

        // ฟังก์ชันจำลองการกดปุ่มทดสอบ
        function simulateMatch() {
            const id = document.getElementById('testStudentId').value;
            if(!id) return alert('ใส่รหัสก่อนทดสอบ');
            sendMatchResultToParent(id);
        }

        // เริ่มต้นเปิดกล้องทันที
        startCamera();
    </script>
</body>
</html>
